query CharacterDetails($id: Int) {
  Character(id: $id) {
    id
    name {
      full
      native
      alternative
    }
    image {
      large
    }
    description(asHtml: false)
    gender
    age
    dateOfBirth {
      year
      month
      day
    }
    favourites
    media(sort: POPULARITY_DESC, perPage: 80) {
      edges {
        characterRole
        voiceActors(language: JAPANESE, sort: RELEVANCE) {
          id
          name {
            full
            native
          }
          image {
            large
          }
          languageV2
        }
        node {
          id
          idMal
          siteUrl
          status(version: 2)
          season
          type
          format
          bannerImage
          episodes
          chapters
          volumes
          synonyms
          isAdult
          countryOfOrigin
          meanScore
          description
          genres
          title {
            userPreferred
            romaji
            english
            native
          }
          coverImage {
            extraLarge
            large
            medium
            color
          }
          startDate {
            year
            month
            day
          }
          endDate {
            year
            month
            day
          }
        }
      }
    }
  }
}
