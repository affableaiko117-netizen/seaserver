version: '3.4'

services:
  stash:
    image: stashapp/stash:latest
    container_name: stash
    restart: unless-stopped
    ports:
      - "9999:9999"
    logging:
      driver: "json-file"
      options:
        max-file: "10"
        max-size: "2m"
    environment:
      - STASH_STASH=/data/
      - STASH_GENERATED=/generated/
      - STASH_METADATA=/metadata/
      - STASH_CACHE=/cache/
      - STASH_PORT=9999
    volumes:
      # Configuration and database
      - ./stash/config:/root/.stash
      # Media library - adjust these paths to your media locations
      - /aeternae/Soul/Otaku Media/Hentai:/media/hentai:ro
      # Generated content (thumbnails, previews, etc)
      - ./stash/generated:/generated
      # Metadata
      - ./stash/metadata:/metadata
      # Cache
      - ./stash/cache:/cache
      # Blobs (scraped content)
      - ./stash/blobs:/blobs
